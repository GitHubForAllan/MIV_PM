<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ProjectFlow — 我的專案</title>
    <link rel="stylesheet" href="styles.css?v=17">
  </head>
  <body>
    <!-- 向下相容：舊版分享連結 index.html?p=xxx 自動跳轉 -->
    <script>
      const _p = new URLSearchParams(location.search).get("p");
      if (_p) location.replace("project.html?p=" + _p);
    </script>

    <main class="home-shell">
      <header class="home-topbar">
        <div>
          <p class="eyebrow">ProjectFlow</p>
          <h1>我的專案</h1>
        </div>
        <button id="new-project" class="primary-button" type="button">
          <span aria-hidden="true">+</span>
          <span>建立新專案</span>
        </button>
      </header>

      <section id="project-grid" class="project-grid" aria-label="專案列表">
        <!-- JS rendered -->
      </section>

      <p id="empty-state" class="home-empty" hidden>
        還沒有任何專案。點擊右上角「建立新專案」開始。
      </p>
    </main>

    <script>
      const REGISTRY_KEY = "projectflow.registry.v1";

      function getRegistry() {
        try { return JSON.parse(localStorage.getItem(REGISTRY_KEY) || "[]"); }
        catch { return []; }
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function fmtDate(ts) {
        if (!ts) return "—";
        return new Intl.DateTimeFormat("zh-Hant", {
          month: "numeric", day: "numeric",
          hour: "2-digit", minute: "2-digit"
        }).format(new Date(ts));
      }

      function progressRing(pct) {
        const r = 16, c = 2 * Math.PI * r;
        const fill = c - (pct / 100) * c;
        return `
          <svg class="progress-ring" viewBox="0 0 40 40" aria-hidden="true">
            <circle cx="20" cy="20" r="${r}" class="ring-bg"/>
            <circle cx="20" cy="20" r="${r}" class="ring-fill"
              stroke-dasharray="${c}" stroke-dashoffset="${fill}"
              transform="rotate(-90 20 20)"/>
            <text x="20" y="20" class="ring-text" text-anchor="middle" dominant-baseline="central">${pct}%</text>
          </svg>`;
      }

      function renderGrid() {
        const projects = getRegistry()
          .slice()
          .sort((a, b) => (b.lastVisited || 0) - (a.lastVisited || 0));
        const grid  = document.querySelector("#project-grid");
        const empty = document.querySelector("#empty-state");

        if (!projects.length) {
          grid.innerHTML = "";
          empty.hidden = false;
          return;
        }

        empty.hidden = true;
        grid.innerHTML = projects.map(p => {
          const pct = Math.min(100, Math.max(0, p.progress ?? 0));
          return `
            <a href="project.html?p=${escHtml(p.id)}" class="project-card">
              <div class="pc-top">
                ${progressRing(pct)}
                <div class="pc-info">
                  <h2 class="pc-name">${escHtml(p.name || "未命名專案")}</h2>
                  <span class="pc-tasks">${p.taskCount ?? 0} 個任務</span>
                </div>
              </div>
              <p class="pc-date">最後開啟 ${fmtDate(p.lastVisited)}</p>
            </a>`;
        }).join("");
      }

      document.querySelector("#new-project").addEventListener("click", () => {
        const id = Math.random().toString(36).slice(2, 10);
        location.href = "project.html?p=" + id;
      });

      renderGrid();
    </script>
  </body>
</html>
